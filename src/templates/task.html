{% extends "base.html" %}

{% block content %}
<header>
    <h1>Task: {{ type | title }}</h1>
    <p>ID: <code>{{ task_id }}</code> | Status: <span id="status-badge" class="status-{{ status }}">{{ status | upper }}</span></p>
</header>

<section>
    <h2>Console Output</h2>
    <pre id="log-console">Connecting to log stream...</pre>
</section>

{% if type == 'reconstruct' %}
<section id="reconstruct-results" style="display:none; margin-top: 2rem;">
    <h2>Outputs</h2>
    <div style="display: flex; gap: 1rem;">
        <a href="/download/{{ task_id }}/bev_map.png" class="btn" download>Download BEV Map (.png)</a>
        <a href="/download/{{ task_id }}/reconstruction.ply" class="btn" download>Download Point Cloud (.ply)</a>
    </div>
    <div style="margin-top: 1rem; border: 1px solid var(--border-color); background: #eee; text-align: center;">
        <img id="bev-img" src="" alt="BEV Map" style="max-width: 100%;">
    </div>
</section>
{% endif %}

<script>
    const consoleEl = document.getElementById('log-console');
    const badge = document.getElementById('status-badge');
    const evtSource = new EventSource(`/stream/logs/{{ task_id }}`);
    
    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        
        if (data.log) {
            if (consoleEl.textContent === "Connecting to log stream...") {
                consoleEl.textContent = "";
            }
            consoleEl.textContent += data.log;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
        
        if (data.status === 'completed' || data.status === 'failed') {
            evtSource.close();
            badge.className = `status-${data.status}`;
            badge.textContent = data.status.toUpperCase();
            
            if (data.status === 'completed' && '{{ type }}' === 'reconstruct') {
                document.getElementById('reconstruct-results').style.display = 'block';
                document.getElementById('bev-img').src = `/download/{{ task_id }}/bev_map.png`;
            }
        }
    };
</script>
{% endblock %}
