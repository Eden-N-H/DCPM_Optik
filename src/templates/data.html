{% extends "base.html" %}

{% block content %}
<header>
    <h1>Synthetic Data Generation</h1>
    <p>Configure and generate an aligned synthetic dataset using the mock Blender backend.</p>
</header>

<form id="data-form">
    <fieldset>
        <legend>Dataset Size</legend>
        <div class="form-group">
            <label for="ds">Total Images</label>
            <input type="number" id="ds" name="scene_generation.dataset_size" value="100" min="10" required>
        </div>
    </fieldset>

    <fieldset>
        <legend>Data Splits (must sum to 1.0)</legend>
        <div style="display:flex; gap:1rem;">
            <div class="form-group" style="flex:1;">
                <label>Train</label>
                <input type="number" name="data.train_split" value="0.8" step="any" min="0" max="1" required>
            </div>
            <div class="form-group" style="flex:1;">
                <label>Validation</label>
                <input type="number" name="data.val_split" value="0.1" step="any" min="0" max="1" required>
            </div>
            <div class="form-group" style="flex:1;">
                <label>Test</label>
                <input type="number" name="data.test_split" value="0.1" step="any" min="0" max="1" required>
            </div>
        </div>
    </fieldset>

    <button type="submit">Generate Dataset</button>
</form>

<script>
    handleFormSubmit('data-form', '/api/run/data');
</script>
{% endblock %}
