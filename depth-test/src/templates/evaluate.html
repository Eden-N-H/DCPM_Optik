{% extends "base.html" %}
{% block content %}

<h1>3. EVALUATION</h1>
<p>CALCULATE METRICS ON TEST SPLIT.</p>

<form onsubmit="handleFormSubmit(event, '/api/run/evaluate')">
    <div class="form-group">
        <label>CHECKPOINT TO EVALUATE</label>
        <select name="checkpoint" required>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>
    
    <button type="submit">EXECUTE EVALUATION</button>
</form>

{% endblock %}
