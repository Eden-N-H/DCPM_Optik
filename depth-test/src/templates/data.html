{% extends "base.html" %}
{% block content %}

<h1>1. DATA GENERATION</h1>
<p>GENERATE SYNTHETIC ROAD SCENES VIA BLENDER SUBPROCESSES.</p>

<form onsubmit="handleFormSubmit(event, '/api/run/data')">
    <div class="form-group">
        <label>DATASET SIZE (TOTAL IMAGES)</label>
        <input type="number" name="scene_generation.dataset_size" value="100" required>
    </div>
    
    <div class="form-group">
        <label>TRAIN SPLIT</label>
        <input type="number" step="0.01" name="data.train_split" value="0.8" required>
    </div>
    
    <div class="form-group">
        <label>VAL SPLIT</label>
        <input type="number" step="0.01" name="data.val_split" value="0.1" required>
    </div>
    
    <div class="form-group">
        <label>TEST SPLIT</label>
        <input type="number" step="0.01" name="data.test_split" value="0.1" required>
    </div>
    
    <button type="submit">EXECUTE DATA GEN</button>
</form>

{% endblock %}
