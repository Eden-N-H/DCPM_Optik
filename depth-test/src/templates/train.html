{% extends "base.html" %}
{% block content %}

<h1>2. LOCAL TRAINING</h1>
<p>SPAWN LOCAL TRAINING SUBPROCESS.</p>

<form onsubmit="handleFormSubmit(event, '/api/run/train')">
    <div class="form-group">
        <label>LEARNING RATE</label>
        <input type="text" name="training.optimizer.lr" value="0.0001" required>
    </div>
    
    <div class="form-group">
        <label>BATCH SIZE</label>
        <input type="number" name="training.batch_size" value="8" required>
    </div>
    
    <div class="form-group">
        <label>EPOCHS</label>
        <input type="number" name="training.epochs" value="200" required>
    </div>
    
    <div class="form-group">
        <label>RESUME CHECKPOINT (OPTIONAL)</label>
        <select name="resume_checkpoint">
            <option value="">-- NONE (START FRESH) --</option>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>
    
    <button type="submit">EXECUTE TRAINING</button>
</form>

{% endblock %}
