{% extends "base.html" %}
{% block content %}

<h1>5. VISUALIZATION</h1>
<p>GENERATE STORYBOARD GRIDS FROM VALIDATION SPLIT.</p>

<form onsubmit="handleFormSubmit(event, '/api/run/visualize')">
    <div class="form-group">
        <label>CYCLEGAN CHECKPOINT (OPTIONAL)</label>
        <select name="cyclegan_ckpt">
            <option value="">-- DEFAULT (UNTRAINED/SKIP) --</option>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>MULTITASK CHECKPOINT</label>
        <select name="multitask_ckpt" required>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label>NUMBER OF SAMPLES</label>
        <input type="number" name="samples" value="5" required>
    </div>
    
    <button type="submit">EXECUTE VISUALIZATION</button>
</form>

{% endblock %}
