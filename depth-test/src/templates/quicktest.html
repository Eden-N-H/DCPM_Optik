{% extends "base.html" %}
{% block content %}

<h1>TEST. QUICKTEST</h1>
<p>RUN END-TO-END PIPELINE (GENERATE -> TRANSLATE -> PREDICT -> BEV).</p>

<form onsubmit="handleFormSubmit(event, '/api/run/quicktest')">
    <div class="form-group">
        <label>CYCLEGAN CHECKPOINT (OPTIONAL)</label>
        <select name="cyclegan_ckpt">
            <option value="">-- RANDOM WEIGHTS --</option>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>MULTITASK CHECKPOINT (OPTIONAL)</label>
        <select name="multitask_ckpt">
            <option value="">-- RANDOM WEIGHTS --</option>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label>NUMBER OF SAMPLES TO GENERATE</label>
        <input type="number" name="samples" value="3" required>
    </div>
    
    <button type="submit">EXECUTE QUICKTEST</button>
</form>

{% endblock %}
