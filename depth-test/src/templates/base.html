        button { font-weight: bold; cursor: pointer; }
        button:hover { background: #000; color: #fff; }
        fieldset { border: 2px solid #000; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; padding: 0 5px; }
    </style>
</head>

    <nav>
