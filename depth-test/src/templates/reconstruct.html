{% extends "base.html" %}
{% block content %}

<h1>4. 3D RECONSTRUCTION</h1>
<p>GENERATE BEV MAP & PLY FROM VIDEO/IMAGES.</p>

<form onsubmit="handleFormSubmit(event, '/api/run/reconstruct')" enctype="multipart/form-data">
    <div class="form-group">
        <label>TARGET CHECKPOINT</label>
        <select name="checkpoint" required>
            {% for ckpt in checkpoints %}
            <option value="{{ ckpt }}">{{ ckpt }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label>INPUT VIDEO/IMAGE</label>
        <input type="file" name="file" required>
    </div>
    
    <button type="submit">EXECUTE RECONSTRUCTION</button>
</form>

{% endblock %}
