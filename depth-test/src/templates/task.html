{% extends "base.html" %}

{% block content %}
<h1>Task Viewer</h1>
<p>
    <strong>Task ID:</strong> {{ task_id }}<br>
    <strong>Type:</strong> {{ type }}<br>
    <strong>Status:</strong> <span id="statusText">{{ status }}</span>
</p>

{% if status == 'running' or status == 'queued' %}
<p id="cancelContainer">
    <button id="cancelBtn">[ Kill Process ]</button>
</p>
{% endif %}

<fieldset>
    <legend>stdout.log</legend>
    <pre id="logConsole" style="background: #000; color: #0f0; height: 500px; overflow-y: scroll; padding: 15px; margin: 0; white-space: pre-wrap; font-family: monospace;"></pre>
</fieldset>

<div id="resultsContainer" style="display: none; margin-top: 30px;">
    <h2>Task Outputs</h2>
    <div id="imageGallery"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const taskId = '{{ task_id }}';
    const logConsole = document.getElementById('logConsole');
    const source = new EventSource(`/stream/logs/${taskId}`);
    
    source.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.log) {
            logConsole.textContent += data.log;
            logConsole.scrollTop = logConsole.scrollHeight;
        }
        
        if (data.status === 'completed' || data.status === 'failed') {
            source.close();
            document.getElementById('statusText').innerText = data.status;
            
            const cancelContainer = document.getElementById('cancelContainer');
            if(cancelContainer) cancelContainer.remove();
            
            // Auto load images if the task created any
            if (data.status === 'completed') {
                loadOutputImages();
            }
        }
    };

    function loadOutputImages() {
        fetch(`/api/tasks/${taskId}/files`)
            .then(res => res.json())
            .then(data => {
                if (data.files && data.files.length > 0) {
                    document.getElementById('resultsContainer').style.display = 'block';
                    const gallery = document.getElementById('imageGallery');
                    data.files.forEach(file => {
                        const wrapper = document.createElement('div');
                        wrapper.style.marginBottom = '20px';
                        wrapper.style.border = '2px solid #000';
                        wrapper.style.padding = '10px';
                        
                        const label = document.createElement('h3');
                        label.innerText = file;
                        label.style.marginTop = '0';
                        
                        const img = document.createElement('img');
                        img.src = `/download/${taskId}/${file}`;
                        img.style.maxWidth = '100%';
                        img.style.display = 'block';
                        
                        wrapper.appendChild(label);
                        wrapper.appendChild(img);
                        gallery.appendChild(wrapper);
                    });
                }
            });
    }

    const cancelBtn = document.getElementById('cancelBtn');
    if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to terminate this task?")) {
                fetch(`/api/tasks/${taskId}/cancel`, {method: 'POST'})
                    .then(r => r.json())
                    .then(data => { if(data.success) { document.getElementById('cancelContainer').remove(); } });
            }
        });
    }
    
    // Auto-load if opened after the task is already completed
    if('{{ status }}' === 'completed') {
        loadOutputImages();
    }
</script>
{% endblock %}
