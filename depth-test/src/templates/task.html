{% extends "base.html" %}
{% block content %}

<h1>TASK: {{ type }}</h1>
<h3>ID: {{ task_id }}</h3>

<p>
    STATUS: <span id="status-badge" class="status-badge status-{{ status }}">{{ status }}</span>
    <br>CREATED: {{ created }}
</p>

{% if status == 'running' %}
<button id="cancel-btn" onclick="cancelTask()" style="background: red; color: white; margin-bottom:1rem;">ABORT TASK</button>
{% endif %}

<div class="log-container" id="log-output"></div>

<div id="visual-results" style="display: none; margin-top: 2rem;">
    <h2>OUTPUT FILES</h2>
    <div class="grid-gallery" id="gallery"></div>
</div>

<script>
    const taskId = '{{ task_id }}';
    const logOutput = document.getElementById('log-output');
    const statusBadge = document.getElementById('status-badge');
    const cancelBtn = document.getElementById('cancel-btn');
    const visualResults = document.getElementById('visual-results');
    const gallery = document.getElementById('gallery');
    
    const source = new EventSource('/stream/logs/' + taskId);
    
    source.onmessage = function(event) {
        const data = JSON.parse(event.data);
        
        if (data.log) {
            logOutput.appendChild(document.createTextNode(data.log));
            logOutput.scrollTop = logOutput.scrollHeight;
        }
        
        if (data.status === 'completed' || data.status === 'failed') {
            statusBadge.className = 'status-badge status-' + data.status;
            statusBadge.innerText = data.status;
            if (cancelBtn) cancelBtn.style.display = 'none';
            source.close();
            
            // If completed, fetch any generated images
            if (data.status === 'completed') {
                fetchFiles();
            }
        }
    };
    
    async function cancelTask() {
        if(!confirm("ARE YOU SURE YOU WANT TO ABORT THIS PROCESS?")) return;
        await fetch('/api/tasks/' + taskId + '/cancel', {method: 'POST'});
        cancelBtn.style.display = 'none';
    }
    
    async function fetchFiles() {
        const res = await fetch('/api/tasks/' + taskId + '/files');
        const data = await res.json();
        
        if (data.files && data.files.length > 0) {
            visualResults.style.display = 'block';
            data.files.forEach(filename => {
                const a = document.createElement('a');
                a.href = `/download/${taskId}/${filename}`;
                a.target = "_blank";
                
                const img = document.createElement('img');
                img.src = `/download/${taskId}/${filename}`;
                
                a.appendChild(img);
                gallery.appendChild(a);
            });
        }
    }
    
    // Attempt to fetch files immediately in case the task was already done
    if ('{{ status }}' === 'completed') {
        fetchFiles();
    }
</script>

{% endblock %}
