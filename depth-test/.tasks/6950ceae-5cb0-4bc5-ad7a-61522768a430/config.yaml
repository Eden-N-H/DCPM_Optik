augmentation:
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    hue: 0.05
    saturation: 0.1
  crop_size: 480
  horizontal_flip: true
  rotation_range: 10
cyclegan:
  input_nc: 4
  input_size: 256
  n_blocks: 9
  ndf: 64
  ngf: 64
  output_nc: 3
  training:
    beta1: 0.5
    beta2: 0.999
    decay_start_epoch: 100
    epochs: 200
    lambda_cycle: 10.0
    lambda_defect: 5.0
    lambda_identity: 0.5
    lr: 0.0002
    pool_size: 50
data:
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  root: ./data/road_quality
  test_split: 0.1
  train_split: 0.8
  val_split: 0.1
domain_adaptation:
  feature_disc:
    channels:
    - 256
    - 128
    - 1
    kernel_size: 3
    stride: 2
  lambda_adv: 0.1
  logit_disc:
    channels:
    - 256
    - 128
    - 1
    kernel_size: 3
    stride: 2
evaluation:
  camera:
  - intrinsic_mae
  - rotation_geodesic
  - translation_error
  depth:
  - rmse
  - abs_rel
  - delta_1
  - delta_2
  - delta_3
  segmentation:
  - miou
  - per_class_iou
  - pixel_accuracy
  - mean_class_accuracy
  severity:
  - mae
  - pearson_correlation
logging:
  checkpoint_interval: 5
  console_log_interval: 10
  tb_log_interval: 100
model:
  decoder:
    channels:
    - 256
    - 128
    - 64
  easpp:
    dilations:
    - 3
    - 6
    - 12
    - 18
    out_channels: 256
  encoder:
    backbone: resnet50
    dsc_stages:
    - 3
    - 4
    pretrained: true
  heads:
    camera:
      extrinsic_params: 6
      hidden_dim:
      - 512
      - 256
      intrinsic_params: 4
    depth:
      hidden_channels: 128
    segmentation:
      hidden_channels: 128
      num_classes: 3
    severity:
      hidden_channels: 128
  soa:
    alpha: 0.3
    gaussian_kernel: 7
    gaussian_sigma: 1.0
    reduction: 16
  view_embedding:
    embed_dim: 32
    num_views: 2
reconstruction:
  bev_resolution: 0.02
  depth_confidence_threshold: 0.5
  height_range:
  - -0.5
  - 0.5
scene_generation:
  camera:
    dashcam:
      height:
      - 1.2
      - 1.5
      pitch:
      - -15
      - -5
    drone:
      height:
      - 8
      - 15
      pitch:
      - -90
      - -60
  dataset_size: 100
  defects:
    count:
    - 1
    - 10
    overlap_threshold: 0.25
    types:
    - crack
    - pothole
    - puddle
    - patch
    - manhole
  domain_randomization:
    hdri_count: 20
    vehicles:
    - 0
    - 5
    weather:
    - clear
    - overcast
    - rain
  render_size: 512
  road:
    lane_width:
    - 3.0
    - 3.75
    lanes:
    - 1
    - 4
    road_length:
    - 50
    - 200
seed: 42
training:
  amp: true
  batch_size: 8
  early_stopping_patience: 30
  epochs: 200
  grad_clip_norm: 1.0
  loss_weights:
    adversarial: 0.1
    camera: 0.3
    depth: 1.0
    segmentation: 1.5
    view: 0.1
  optimizer:
    beta1: 0.9
    beta2: 0.999
    lr: 0.0001
    type: adam
    weight_decay: 1.0e-05
  scheduler:
    factor: 0.5
    patience: 10
    type: reduce_on_plateau
